<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through Infinity</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: black;
            font-family: sans-serif;
        }

        /* Tło strony */
        .main-container {
            background-image: url('cosmos.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column; /* Układ pionowy: napisy na górze, guzik niżej */
            position: relative;
        }

        /* Styl napisów (lewy górny róg) */
        .header {
            padding: 40px;
            color: white;
            z-index: 2;
        }

        .header h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.5rem;
            margin: 5px 0 0 0;
            opacity: 0.8;
        }

        /* Kontener na guzik (środek ekranu) */
        .button-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Idealne wyśrodkowanie */
            z-index: 1;
        }

        .guzik-img {
            width: 250px; /* Rozmiar Twojej kuli */
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <h1>TOP-IDEOLOGICAL-STATE</h1>
            <p>Through infinity</p>
        </div>

        <div class="button-wrapper">
            <img src="button1.png" alt="Guzik" class="guzik-img">
        </div>
    </div>

</body>
</html>
